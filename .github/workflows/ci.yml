name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build e testes
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore DevInbox.slnx

      - name: Build (Release; warnings tratados como erro)
        run: dotnet build DevInbox.slnx -c Release --no-restore

      - name: Testes
        run: dotnet test DevInbox.slnx -c Release --no-build --verbosity normal
